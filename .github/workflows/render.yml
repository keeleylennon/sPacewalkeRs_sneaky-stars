name: Render manuscript

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: '.'

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Create directories
        run: mkdir -p results/figures _site

      - name: Run Python analysis
        run: python src/analyse_spacewalks.py

      - name: Run R analysis
        run: Rscript src/analyse_spacewalks.R

      - name: Render manuscript
        run: quarto render manuscript.qmd --to html

      - name: Collect output
        run: |
          cp manuscript.html _site/
          cp -r manuscript_files _site/ 2>/dev/null || true
          echo '<meta http-equiv="refresh" content="0; url=manuscript.html">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
